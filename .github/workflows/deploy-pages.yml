# Publica el build en /docs para GitHub Pages (carpeta del repo).
# En Settings → Pages: Source = "Deploy from a branch", Branch main, Folder /docs

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build para GitHub Pages
        run: npm run build:pages

      - name: Verificar index compilado
        run: |
          grep -q 'Sistema-cobranzas-y-gesti-n-de-clientes/assets/' dist/index.html
          if grep -qE 'main\.tsx|%BASE_URL%' dist/index.html; then
            echo 'ERROR: dist/index.html no es build de producción'
            cat dist/index.html
            exit 1
          fi
          test -f dist/.nojekyll

      - name: Copiar build a docs/
        run: |
          rm -rf docs
          cp -a dist/. docs/
          touch docs/.nojekyll

      - name: Commit docs/ (evita loop con paths-ignore)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(pages): publicar build en docs [skip ci]'
          file_pattern: docs/**
